name: python-tests

on:
  push:
    paths: ['taky/**', '.github/workflows/python-tests.yml']
    branches: [ "main" ]
  pull_request:
    paths: ['taky/**', '.github/workflows/python-tests.yml']
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check code formatting with black
        run: black --check --diff taky/ tests/

      - name: Run tests with coverage
        run: pytest
